<!DOCTYPE html>
<html>
<head>
<title>Verify Pickup - EPS</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #eef2f7;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
}

.page-wrapper {
    width: 100%;
    max-width: 720px;
}

/* ========== ALERT ========== */
.alert {
    border-radius: 12px;
    border: none;
    font-size: 0.85rem;
    margin-bottom: 20px;
}

/* ========== CARD ========== */
.verify-card {
    background: white;
    border-radius: 20px;
    padding: 32px;
    border: 1px solid #e8ecf0;
    box-shadow: 0 4px 24px rgba(0,0,0,0.05);
}

/* ========== CARD HEADER ========== */
.card-head {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid #e8ecf0;
}

.card-head .head-icon {
    width: 50px;
    height: 50px;
    background: rgba(5,96,67,0.1);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.card-head .head-icon i {
    font-size: 1.4rem;
    color: #056043;
}

.card-head h4 {
    font-size: 1.15rem;
    font-weight: 700;
    color: #1e293b;
    margin: 0;
}

.card-head p {
    font-size: 0.75rem;
    color: #64748b;
    margin: 4px 0 0;
}

/* ========== TABLE ========== */
.table-responsive {
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #e8ecf0;
    margin-bottom: 24px;
}

.table {
    margin-bottom: 0;
}

.table th {
    background: #f8fafc;
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #64748b;
    border-bottom: 1px solid #e2e8f0;
    padding: 14px 18px;
}

.table td {
    padding: 14px 18px;
    vertical-align: middle;
    font-size: 0.87rem;
    color: #1e293b;
    border-bottom: 1px solid #f1f5f9;
}

.table tbody tr:last-child td {
    border-bottom: none;
}

.table tbody tr:hover {
    background: #f8fafc;
}

.waste-name {
    font-weight: 600;
    color: #1e293b;
}

.price-tag {
    font-weight: 600;
    color: #056043;
    background: #d1fae5;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 0.8rem;
    display: inline-block;
}

/* ========== QTY INPUT ========== */
.qty-input {
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 0.87rem;
    font-family: 'Inter', sans-serif;
    color: #1e293b;
    width: 110px;
    transition: 0.2s;
    outline: none;
}

.qty-input:focus {
    border-color: #056043;
    box-shadow: 0 0 0 3px rgba(5,96,67,0.1);
}

/* ========== SUBMIT BUTTON ========== */
.btn-submit {
    background: #056043;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 12px 28px;
    font-size: 0.9rem;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: 0.2s;
    width: 100%;
    justify-content: center;
}

.btn-submit:hover {
    background: #044d36;
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(5,96,67,0.25);
}

/* ========== BACK LINK ========== */
.back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #64748b;
    font-size: 0.82rem;
    font-weight: 500;
    text-decoration: none;
    margin-bottom: 20px;
    transition: 0.2s;
}

.back-link:hover {
    color: #056043;
}

@media (max-width: 480px) {
    body { padding: 20px 12px; }
    .verify-card { padding: 20px; }
    .qty-input { width: 90px; }
}
</style>

</head>

<body>

<div class="page-wrapper">

    <!-- BACK LINK -->
    <a href="{% url 'assigned_pickups' %}" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Assigned Pickups
    </a>

    <!-- MESSAGES -->
    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        <i class="fas fa-{% if message.tags == 'success' %}check-circle{% elif message.tags == 'error' %}exclamation-circle{% else %}info-circle{% endif %} me-2"></i>
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% endif %}

    <!-- MAIN CARD -->
    <div class="verify-card">

        <!-- HEADER -->
        <div class="card-head">
            <div class="head-icon">
                <i class="fas fa-shield-alt"></i>
            </div>
            <div>
                <h4>Verify Pickup</h4>
                <p><i class="fas fa-hashtag" style="font-size:0.7rem;"></i> Pickup ID: {{ pickup.id }}</p>
            </div>
        </div>

        <!-- FORM -->
        <form method="POST">
            {% csrf_token %}

            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th><i class="fas fa-recycle me-1"></i> Waste</th>
                            <th><i class="fas fa-tag me-1"></i> Price</th>
                            <th><i class="fas fa-boxes me-1"></i> Quantity</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for t in transactions %}
                        <tr>
                            <td><span class="waste-name">{{ t.waste.waste_type }}</span></td>
                            <td><span class="price-tag">₹{{ t.waste.price }}</span></td>
                            <td>
                                <input
                                    type="number"
                                    name="qty_{{ t.id }}"
                                    value="{{ t.waste_quantity }}"
                                    class="qty-input"
                                    min="0"
                                >
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-check-circle"></i> Submit Verification
            </button>

        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
